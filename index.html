<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- css -->
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="container mx-auto ">
    <header class=" mt-[60px]">
        <h1 class="text-[32px] font-semibold text-blue-950">Job Application Tracker</h1>
        <div class="grid grid-cols-3 mt-[20px] gap-[16px]">
            <div class="border border-gray-200 p-[20px]">
                <p class="text-[14px]">Total</p>
                <p id="totalCount" class="text-[24px] text-blue-950 font-bold">0</p>
            </div>
            <div class="border border-gray-200 p-[20px]">
                <p class="text-[14px]">Interview</p>
                <p id="interviewCount" class="text-green-400 font-bold text-[24px]">0</p>
            </div>
            <div class="border border-gray-200 p-[20px]">
                <p class="text-[14px]">Rejected</p>
                <p id="rejectedCount" class="text-red-400 font-bold text-[24px]">0</p>
            </div>
        </div>
        <hr style="border: 1px solid #e6e7e9;" class="my-[30px]">
    </header>

    <!-- JS link -->
    <script src="function.js"></script>
</body>

</html>
